<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QUNIX Store — Under Maintenance</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      color: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 520px; width: 100%; }
    .logo {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 3rem;
    }
    .divider {
      width: 2rem;
      height: 1px;
      background: #ddd;
      margin: 0 auto 2.5rem;
    }
    h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #0a0a0a;
      margin-bottom: 1.2rem;
    }
    p {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: #666;
      line-height: 1.9;
    }
    a {
      color: #0a0a0a;
      text-decoration: underline;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.5; }
    .back {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      color: #aaa;
      border-bottom: 1px solid #ddd;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back:hover { color: #0a0a0a; border-color: #0a0a0a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Q U N I X &nbsp; Store</div>
    <div class="divider"></div>
    <h1>Site is Under Maintenance</h1>
    <p>
      For queries, kindly use the main site or reach us at<br>
      <a href="mailto:contact@qunixspace.com">contact@qunixspace.com</a>
    </p>
    <a href="https://qunixspace.com" class="back">← Back to qunixspace.com</a>
  </div>
</body>
</html>
